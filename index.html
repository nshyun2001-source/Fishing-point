<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>낚시포인트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --g:#1D9E75;--g2:#0F6E56;--g3:#E8F8F2;--g4:#B2E8D4;
  --r:#D85A30;--r2:#FEF0EB;--y:#B07010;--y2:#FEF3DF;
  --bg:#F6F6F4;--bg2:#FFFFFF;--bg3:#EEEEED;
  --t1:#111;--t2:#555;--t3:#999;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.15);
  --rd:8px;--rd2:14px;--rd3:20px;
  --F:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
html,body,#root{width:100%;height:100%;overflow:hidden;font-family:var(--F);background:var(--bg);-webkit-font-smoothing:antialiased;color:var(--t1);}
#root{display:flex;flex-direction:column;}
.pg{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.pg::-webkit-scrollbar{display:none;}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg2);border-top:1px solid var(--bd);padding:6px 0 max(14px,env(safe-area-inset-bottom));flex-shrink:0;}
.tab{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;color:var(--t3);font-size:10px;font-family:var(--F);user-select:none;}
.tab.on{color:var(--g);}
.tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block;}
.fab-wrap{display:flex;justify-content:center;align-items:flex-start;}
.fab{width:48px;height:48px;border-radius:24px;background:var(--g);border:none;display:grid;place-items:center;cursor:pointer;margin-top:-12px;box-shadow:0 4px 12px rgba(29,158,117,.4);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.ov{position:fixed;inset:0;background:var(--bg);z-index:200;transform:translateX(102%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.ov.show{transform:none;}
.nav{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.nav-tx{flex:1;min-width:0;}
.nav-tx h1{font-size:17px;font-weight:600;color:var(--t1);}
.nav-tx p{font-size:12px;color:var(--t3);margin-top:1px;}
.nb,.ib{width:34px;height:34px;border-radius:var(--rd);background:var(--bg3);border:none;display:grid;place-items:center;cursor:pointer;flex-shrink:0;color:var(--t1);}
.nb svg,.ib svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.phd{padding:14px 14px 10px;background:var(--bg2);border-bottom:1px solid var(--bd);}
.phd .eyebrow{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;}
.phd h1{font-size:22px;font-weight:700;color:var(--t1);}
.section{padding:12px 14px 0;}
.card{background:var(--bg2);border-radius:var(--rd2);border:1px solid var(--bd);padding:14px;}
.card+.card{margin-top:10px;}
.card-h{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:10px;}
.hero-card{background:var(--bg2);border-radius:var(--rd2);border:1px solid var(--bd);overflow:hidden;}
.hero-top{background:var(--g3);padding:14px;border-bottom:1px solid var(--g4);}
.hero-top .eyebrow{font-size:11px;font-weight:600;color:var(--g2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px;}
.hero-top h2{font-size:16px;font-weight:600;color:var(--g2);line-height:1.4;}
.hero-bot{padding:12px 14px 14px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd);padding:12px 13px;cursor:pointer;}
.kpi .lb{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;}
.kpi .vl{font-size:24px;font-weight:700;color:var(--t1);line-height:1;}
.kpi .vl .u{font-size:12px;font-weight:400;color:var(--t2);margin-left:2px;}
.kpi .dl{font-size:11px;color:var(--g);margin-top:3px;}
.kpi .dl.dim{color:var(--t3);}
.rows{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer;}
.row:last-child{border-bottom:none;}
.row:active{opacity:.7;}
.row.nd{cursor:default;}.row.nd:active{opacity:1;}
.ri{width:38px;height:38px;border-radius:var(--rd);background:var(--g3);display:grid;place-items:center;color:var(--g);flex-shrink:0;}
.ri svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.rt{flex:1;min-width:0;}
.rt .a{font-size:14px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rt .b{font-size:12px;color:var(--t3);margin-top:2px;}
.re{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11.5px;white-space:nowrap;font-weight:500;}
.chip.g{background:var(--g3);color:var(--g2);}
.chip.r{background:var(--r2);color:var(--r);}
.chip.y{background:var(--y2);color:var(--y);}
.chip.n{background:var(--bg3);color:var(--t2);}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;font-weight:500;white-space:nowrap;}
.tag.on{background:var(--g);border-color:var(--g);color:#fff;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border-radius:var(--rd);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--F);}
.btn.pri{background:var(--g);color:#fff;}
.btn.pri:active{background:var(--g2);}
.btn.sec{background:var(--bg3);color:var(--t1);}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.btn.pri svg{stroke:#fff;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ic{background:var(--bg3);border-radius:var(--rd);padding:10px 12px;}
.ic .ik{font-size:11.5px;color:var(--t3);margin-bottom:3px;}
.ic .iv{font-size:15px;font-weight:600;color:var(--t1);}
.tide{position:relative;height:4px;border-radius:99px;background:var(--bd2);margin-top:10px;cursor:pointer;}
.tide .fill{position:absolute;left:0;top:0;height:100%;width:32%;background:var(--g);border-radius:99px;}
.tide .pin{position:absolute;top:-5px;left:32%;width:14px;height:14px;border-radius:7px;background:var(--g);border:2px solid var(--bg2);transform:translateX(-50%);}
.tide-lbs{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t3);}
.seg{display:inline-flex;background:var(--bg3);border-radius:var(--rd);padding:2px;border:1px solid var(--bd);}
.seg button{background:none;border:none;padding:6px 14px;font-size:12px;font-weight:500;color:var(--t2);border-radius:6px;cursor:pointer;font-family:var(--F);}
.seg button.on{background:var(--bg2);color:var(--g);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.bars{display:flex;align-items:flex-end;gap:4px;height:90px;}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;}
.bar.g{background:var(--g);}
.bar.r{background:var(--r);}
.bar.d{background:var(--bg3);}
.blbs{display:flex;justify-content:space-between;margin-top:4px;}
.blbs span{flex:1;text-align:center;font-size:10px;color:var(--t3);}
.gauge{height:5px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:5px;}
.gauge .fill{height:100%;border-radius:99px;}
.tl{padding-left:18px;position:relative;}
.tl::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:1.5px;background:var(--bd2);}
.tle{position:relative;padding-bottom:10px;cursor:pointer;}
.tle::before{content:'';position:absolute;left:-18px;top:8px;width:12px;height:12px;border-radius:6px;background:var(--bg2);border:2px solid var(--g);}
.tlc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd2);padding:12px 13px;}
.tldate{font-size:11px;font-weight:600;color:var(--g);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hd{text-align:center;font-size:11px;font-weight:500;color:var(--t3);padding:2px 0;}
.cd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:var(--t2);}
.cd.has{background:var(--g3);color:var(--g2);font-weight:700;cursor:pointer;}
.cd.today{border:1.5px solid var(--g);color:var(--t1);}
.cd.sel{background:var(--g);color:#fff;font-weight:700;}
.mapbg{position:absolute;inset:0;background:linear-gradient(180deg,#daeee5,#c5e5d5);}
.mk{position:absolute;width:26px;height:26px;border-radius:50% 50% 50% 0;transform:translate(-50%,-100%) rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;transition:transform .18s;}
.mk:active,.mk.on{transform:translate(-50%,-115%) rotate(-45deg) scale(1.2);}
.mk.g{background:var(--g);}.mk.y{background:#B07010;}.mk.r{background:var(--r);}
.mpop{position:absolute;transform:translate(-50%,-100%);background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd);padding:8px 11px;box-shadow:0 4px 16px rgba(0,0,0,.14);pointer-events:none;white-space:nowrap;}
.mpop .a{font-size:13px;font-weight:600;color:var(--t1);}
.mpop .b{font-size:11.5px;color:var(--g);margin-top:2px;}
.bsheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg2);border-radius:var(--rd3) var(--rd3) 0 0;border-top:1px solid var(--bd);padding:10px 14px 14px;}
.grab{width:36px;height:4px;border-radius:2px;background:var(--bd2);margin:0 auto 12px;}
.msearch{position:absolute;top:10px;left:10px;right:10px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd);padding:9px 12px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.msearch svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.msearch input{flex:1;border:none;background:none;font-size:14px;font-family:var(--F);color:var(--t1);outline:none;}
.fl{margin-bottom:10px;}
.fl label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
.fl input,.fl textarea,.fl select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rd);font-size:14px;font-family:var(--F);color:var(--t1);outline:none;}
.fl input:focus,.fl textarea:focus,.fl select:focus{border-color:var(--g);background:var(--bg2);}
.fl textarea{resize:none;line-height:1.5;}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.pc{aspect-ratio:1;border-radius:var(--rd);background:var(--bg3);border:1.5px dashed var(--bd2);display:grid;place-items:center;cursor:pointer;color:var(--t3);}
.pc svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.tgl{width:42px;height:24px;border-radius:12px;background:var(--bd2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.tgl.on{background:var(--g);}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.tgl.on::after{left:21px;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 18px;border-radius:var(--rd);font-size:13px;font-weight:500;white-space:nowrap;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;}
#toast.show{opacity:1;}
.row-hr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.row-hr h2{font-size:14px;font-weight:600;color:var(--t1);}
.slnk{font-size:12.5px;color:var(--g);cursor:pointer;font-weight:500;}
.ndot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:4px;background:var(--r);border:2px solid var(--bg2);}
.env-row{display:flex;gap:6px;flex-wrap:wrap;}
.env-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:11.5px;background:var(--bg3);color:var(--t2);border:1px solid var(--bd);}
.env-chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>

function openSp(name){var info=SPINFO[name]||{s:'연중',max:'–',avg:'–',note:'정보 준비 중'};var em={'감성돔':'🐟','벵에돔':'🐠','참돔':'🎏','돌돔':'🐡','무늬오징어':'🦑','우럭':'🐟','광어':'🐋','볼락':'🐡','전어':'🐟','고등어':'🐟','학공치':'🐠','놀래기':'🐟'};var pts=PTS.filter(function(p){return p.sp.indexOf(name)>=0;});var ptR=pts.map(function(p){return '<div class="row" data-pid-sp="'+p.id+'"><div class="ri">'+I.pin+'</div><div class="rt"><div class="a">'+e(p.nm)+'</div><div class="b">'+e(p.rg)+' · '+p.ds+'km</div></div><span class="chip g">★ '+p.rt+'</span></div>';}).join('');showOv('ov-sp','<div class="nav"><button class="nb" data-close="ov-sp">'+I.back+'</button><div class="nav-tx"><p>어종 정보</p><h1>'+e(name)+'</h1></div></div><div class="pg"><div style="height:110px;background:var(--g3);display:flex;align-items:center;justify-content:center"><span style="font-size:60px">'+(em[name]||'🐟')+'</span></div><div class="section"><div class="card"><h2 class="card-h">기본 정보</h2>'+[['제철',info.s],['최대 크기',info.max],['평균 크기',info.avg]].map(function(kv){return '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)"><span style="font-size:14px;color:var(--t2)">'+kv[0]+'</span><span style="font-size:14px;font-weight:600;color:var(--t1)">'+kv[1]+'</span></div>';}).join('')+'</div></div><div class="section"><div class="card"><h2 class="card-h">낚시 방법</h2><p style="font-size:14px;line-height:1.7;color:var(--t2)">'+e(info.note)+'</p></div></div>'+(pts.length?'<div class="section" style="padding-bottom:16px"><div class="card"><h2 class="card-h">주요 포인트</h2><div class="rows">'+ptR+'</div></div></div>':'')+'</div>');}
function openSet(){var tr=function(lb,key){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd);cursor:pointer" data-tgl="'+key+'"><span style="font-size:14.5px;color:var(--t1)">'+lb+'</span><div class="tgl'+(A[key]?' on':'')+'" id="tg-'+key+'"></div></div>';};showOv('ov-set','<div class="nav"><button class="nb" data-close="ov-set">'+I.back+'</button><div class="nav-tx"><h1>설정</h1></div></div><div class="pg"><div style="padding:0 14px"><p style="font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 8px">알림 설정</p><div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd2);padding:0 14px">'+tr('조황 알림','tS')+tr('날씨 경보','tW')+tr('물때 알림','tT')+tr('앱 푸시 알림','tP')+'</div><p style="font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin:18px 0 8px">계정</p><div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rd2);padding:0 14px">'+[['사용자명','민준'],['지역 설정','울산 동구'],['단위','미터 / °C']].map(function(r){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bd);cursor:pointer" data-set-acct="'+r[0]+'"><span style="font-size:14.5px;color:var(--t1)">'+r[0]+'</span><span style="font-size:13.5px;color:var(--g);font-weight:500">'+r[1]+'</span></div>';}).join('')+'<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;cursor:pointer" data-set-acct="export"><span style="font-size:14.5px;color:var(--t1)">데이터 내보내기</span><span style="font-size:13.5px;color:var(--t3)">CSV</span></div></div><div style="height:20px"></div></div></div>');}
function saveLog(){var g=function(id){var el=document.getElementById(id);return el?el.value:'';};A.lf.dt=g('lf-dt')||A.lf.dt;A.lf.st=g('lf-st')||A.lf.st;A.lf.pt=g('lf-pt');A.lf.du=g('lf-du');A.lf.co=g('lf-co');A.lf.ba=g('lf-ba');A.lf.nt=g('lf-nt');var total=A.lfi.reduce(function(a,f){return a+(parseInt(f.c)||0);},0);LOGS.unshift({id:'j'+Date.now(),dt:A.lf.dt,pt:A.lf.pt||'미지정',rs:total>0?'+'+total+'미':'꽝',wx:'맑음',ti:'중조',nt:A.lf.nt||'기록 없음',fi:A.lfi.filter(function(f){return f.c;}).map(function(f){return {n:f.s,c:parseInt(f.c)||0,s:f.sz||'–'};}),tp:'14.2°C',wt:'16.4°C',wi:'E 3m/s',wv:'0.6m'});A.lf={dt:'2026-05-09',st:'05:00',du:'04:00',pt:'',co:'',ba:'크릴 + 집어제',nt:''};A.lfi=[{s:'감성돔',c:'',sz:''}];A.lgr=['찌낚시'];hideOv('ov-log');go('jnl');setTimeout(function(){showToast('일지가 저장되었습니다 ✓');},150);}
document.getElementById('root').addEventListener('click',function(ev){
  var t=ev.target;
  if(t.closest('#fab-btn')){openLog('');return;}
  var tb=t.closest('[data-go]');if(tb&&tb.closest('.tabs')){go(tb.dataset.go);return;}
  if(tb&&!tb.closest('.tabs')){go(tb.dataset.go);return;}
  var cl=t.closest('[data-close]');if(cl){hideOv(cl.dataset.close);return;}
  var ac=t.closest('[data-act]');if(ac){var a=ac.dataset.act;if(a==='notif'){openNotif();return;}if(a==='tide'){openTide();return;}if(a==='settings'){openSet();return;}if(a==='newlog'){openLog('');return;}if(a==='map-clear'){A.mQ='';A.mAct=null;render();return;}if(a==='jdate-clear'){A.jDate=null;render();return;}if(a==='notif-clear'){NT.length=0;hideOv('ov-notif');render();return;}if(a==='photo'){showToast('사진 기능은 앱에서 이용 가능');return;}}
  var pi=t.closest('[data-pid]');if(pi){openPt(pi.dataset.pid);return;}
  var pild=t.closest('[data-pid-ld]');if(pild){hideOv('ov-ld');setTimeout(function(){openPt(pild.dataset.pidLd);},220);return;}
  var pisp=t.closest('[data-pid-sp]');if(pisp){hideOv('ov-sp');setTimeout(function(){openPt(pisp.dataset.pidSp);},220);return;}
  var li=t.closest('[data-lid]');if(li){openLD(li.dataset.lid);return;}
  var lipt=t.closest('[data-lid-pt]');if(lipt){hideOv('ov-pt');setTimeout(function(){openLD(lipt.dataset.lidPt);},220);return;}
  var sp=t.closest('[data-sp]');if(sp){openSp(sp.dataset.sp);return;}
  var lpt=t.closest('[data-logpt]');if(lpt){openLog(lpt.dataset.logpt);return;}
  var rl=t.closest('[data-relog]');if(rl){A.lf.pt=rl.dataset.relog;hideOv('ov-ld');setTimeout(function(){openLog(rl.dataset.relog);},220);return;}
  var mk=t.closest('[data-mkid]');if(mk){var mid=mk.dataset.mkid;if(A.mAct===mid){openPt(mid);}else{A.mAct=mid;render();}return;}
  var mf=t.closest('[data-mf]');if(mf){A.mFlt=mf.dataset.mf;A.mAct=null;render();return;}
  var jf=t.closest('[data-jf]');if(jf){A.jFlt=jf.dataset.jf;render();return;}
  var cd=t.closest('[data-cald]');if(cd){var dv=parseInt(cd.dataset.cald);A.jDate=A.jDate===dv?null:dv;render();return;}
  var spd=t.closest('[data-spd]');if(spd){A.spd=spd.dataset.spd;render();return;}
  var fav=t.closest('[data-favid]');if(fav){toggleFav(fav.dataset.favid);return;}
  if(t.closest('#log-save')||t.closest('#log-save2')){saveLog();return;}
  if(t.closest('#log-back')){A.lf.pt='';hideOv('ov-log');return;}
  if(t.closest('#add-fish')){A.lfi.push({s:'감성돔',c:'',sz:''});rebuildLog();return;}
  var fd=t.closest('[data-fi-del]');if(fd){A.lfi.splice(parseInt(fd.dataset.fiDel),1);rebuildLog();return;}
  var gr=t.closest('[data-gr]');if(gr){var g2=gr.dataset.gr;var idx=A.lgr.indexOf(g2);if(idx>=0)A.lgr.splice(idx,1);else A.lgr.push(g2);rebuildLog();return;}
  var tgl=t.closest('[data-tgl]');if(tgl){var k=tgl.dataset.tgl;A[k]=A[k]?0:1;var el2=document.getElementById('tg-'+k);if(el2)el2.className='tgl'+(A[k]?' on':'');return;}
  var sa=t.closest('[data-set-acct]');if(sa){showToast(sa.dataset.setAcct==='export'?'CSV로 내보냈습니다':sa.dataset.setAcct+' 수정 기능 준비 중');return;}
});
document.getElementById('root').addEventListener('input',function(ev){var t=ev.target;if(t.id==='mqinput'){A.mQ=t.value;A.mAct=null;render();return;}if(t.dataset.fiC!==undefined){var i=parseInt(t.dataset.fiC);if(A.lfi[i])A.lfi[i].c=t.value;}if(t.dataset.fiSz!==undefined){var i2=parseInt(t.dataset.fiSz);if(A.lfi[i2])A.lfi[i2].sz=t.value;}});
document.getElementById('root').addEventListener('change',function(ev){var t=ev.target;if(t.dataset.fiS!==undefined){var i=parseInt(t.dataset.fiS);if(A.lfi[i])A.lfi[i].s=t.value;}});
render();
</script>
